services:

  postgres:
    image: postgres:16
    container_name: invoice-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: invoices
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: invoice-prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0 --port 4200
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_API_URL: https://invoice-pipeline-prefect.lameda-ai.xyz/api
    ports:
      - "4200:4200"

  app:
    build: .
    container_name: invoice-app
    restart: unless-stopped
    ports:
      - "24574:8000"
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/invoices
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      AUTO_APPROVE_THRESHOLD: ${AUTO_APPROVE_THRESHOLD:-5000.00}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: production
      TESSERACT_CMD: ""
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      postgres:
        condition: service_healthy
      prefect-server:
        condition: service_started

volumes:
  postgres_data: